<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>zurich</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
:root{
  --bg:#f6f2ea;--card:#fffaf3;--ink:#26211b;--muted:#74695d;--accent:#b35a16;
  --green:#246a28;--blue:#0a63a6;--red:#b31212;--border:#e5d8c5;--shadow:0 10px 28px rgba(80,50,15,.08)
}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink)}
.wrap{max-width:1180px;margin:0 auto;padding:calc(10px + env(safe-area-inset-top)) 10px 28px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.section-title{font-size:21px;margin:0 0 12px;font-weight:900;letter-spacing:.2px}.tiny{font-size:12px;color:var(--muted);line-height:1.45;margin:8px 0 0}.order-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.order-link{display:flex;gap:8px;align-items:center;text-decoration:none;color:var(--ink);background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px;min-height:58px}.order-link:active{transform:scale(.99)}.badge{flex:0 0 auto;width:29px;height:29px;border-radius:50%;background:var(--accent);color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center}.order-link b{font-size:14px;line-height:1.25;display:block}.order-link span{font-size:11px;color:var(--muted);display:block;margin-top:2px;line-height:1.2}
.map-wrap{position:relative}.map-hint{position:absolute;z-index:450;right:18px;top:18px;background:rgba(255,250,242,.94);border:1px solid var(--border);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;color:var(--muted);box-shadow:0 4px 12px rgba(0,0,0,.08)}#map{height:59vh;min-height:470px;border-radius:18px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;box-shadow:var(--shadow)}
.rail{display:grid;grid-template-columns:1fr 1fr;gap:10px}.rail-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:12px}.rail-card h3{margin:0 0 5px;font-size:17px}.rail-card p{margin:0 0 10px;color:var(--muted);font-size:13px;line-height:1.5}.btnrow{display:flex;gap:7px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:850;border:1px solid transparent;white-space:nowrap}.btn.google{background:#eaf4ff;color:var(--blue);border-color:#cde5fb}.btn.apple{background:#edf8ed;color:var(--green);border-color:#cde8cb}.btn.sbb{background:#fff0ef;color:var(--red);border-color:#f5ceca}.btn.dark{background:#2b261f;color:#fff;border-color:#2b261f}.btn.small{font-size:12px;padding:7px 10px}.modules{display:grid;grid-template-columns:1fr 1fr;gap:12px}.stop{background:#fff;border:1px solid var(--border);border-radius:16px;padding:14px;scroll-margin-top:12px}.stophead{display:flex;gap:10px;align-items:flex-start}.stop h2{margin:0;font-size:17px;line-height:1.25}.time{font-size:12px;color:#8a5a2a;margin-top:3px;font-weight:800}.tag{display:inline-block;border-radius:999px;background:#f1e4d4;color:#805019;padding:2px 8px;margin-right:5px;font-size:12px;font-weight:850}.txt{margin:9px 0 0;font-size:13px;line-height:1.62;color:#332d25}.muted{color:var(--muted)}.marker-label{background:var(--accent);color:white;border-radius:50%;width:30px;height:30px;line-height:30px;text-align:center;font-weight:900;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)}.leaflet-popup-content{min-width:260px}.popup-title{font-weight:900;font-size:15px;margin-bottom:5px}.popup-meta{font-size:12px;color:#555;line-height:1.55;margin-bottom:8px}
@media(max-width:860px){.order-grid{grid-template-columns:1fr 1fr}.rail,.modules{grid-template-columns:1fr}#map{height:55vh;min-height:390px}.section-title{font-size:19px}.card{padding:12px}}
@media(max-width:430px){.order-grid{grid-template-columns:1fr}.btn{width:100%}.btnrow{gap:6px}.map-hint{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 class="section-title">今日打卡顺序</h1>
    <div id="orderNav" class="order-grid"></div>
  </div>

  <div class="map-wrap">
    <div class="map-hint">点击编号查看点位</div>
    <div id="map"></div>
  </div>

  <div class="card">
    <h2 class="section-title">SBB 火车</h2>
    <div class="rail">
      <div class="rail-card">
        <h3>Olten → Zürich HB</h3>
        <p>建议 12:20 左右出发，到苏黎世主站后开始倒序打卡。</p>
        <div class="btnrow">
          <a class="btn sbb" href="sbbmobile://timetable?from=Olten&to=Z%C3%BCrich%20HB&traveldate=2026-05-14&traveltime=12%3A20&timemode=departure&appid=zurich" onclick="copyText('Olten → Zürich HB，12:20 左右出发')">打开 SBB Mobile</a>
        </div>
      </div>
      <div class="rail-card">
        <h3>Zürich HB → Zürich Flughafen</h3>
        <p>建议 18:52 左右离开苏黎世主站，19:30 前进入机场。</p>
        <div class="btnrow">
          <a class="btn sbb" href="sbbmobile://timetable?from=Z%C3%BCrich%20HB&to=Z%C3%BCrich%20Flughafen&traveldate=2026-05-14&traveltime=18%3A52&timemode=departure&appid=zurich" onclick="copyText('Zürich HB → Zürich Flughafen，18:52 左右出发')">打开 SBB Mobile</a>
        </div>
      </div>
    </div>
    <p class="tiny">按钮使用 SBB Mobile App 跳转，不放网页备用链接；若手机未能自动带入站点，已同时复制查询文字，可直接粘贴到 SBB Mobile。</p>
  </div>

  <div class="card">
    <h2 class="section-title">每个打卡点</h2>
    <div id="modules" class="modules"></div>
  </div>
</div>

<script>
const points = [
  {no:9,time:'13:20–14:05', title:'苏黎世联邦理工学院主楼 + 观景大平台', short:'苏黎世联邦理工学院主楼 / 观景大平台', label:'ETH Zurich Main Building Polyterrasse', purpose:'先上到城市高点，把苏黎世联邦理工学院主楼和观景大平台一起打卡。', shoot:'拍主楼外观、观景平台栏杆边的老城俯瞰、利马特河、教堂尖顶和远处湖面。', lat:47.37648, lng:8.54808},
  {no:8,time:'14:05–14:35', title:'苏黎世美术馆', short:'苏黎世美术馆', label:'Kunsthaus Zurich', purpose:'从联邦理工学院下山后的顺路点，适合作为建筑外观和城市文化感补充。', shoot:'拍美术馆外立面、门口街景、路牌和电车经过的城市感画面。', lat:47.37026, lng:8.54813},
  {no:7,time:'14:35–15:25', title:'天鹅湖附近', short:'天鹅湖附近', label:'Salon Theater Herzbaracke Zurich', purpose:'去苏黎世湖边拍水面和天鹅，这是整条路线最有湖边旅行感的位置。', shoot:'拍天鹅、湖面、湖边长椅、歌剧院附近街景、远处船只和下午光线下的水面反光。', lat:47.36644, lng:8.54436},
  {no:6,time:'15:25–15:55', title:'苏黎世大教堂', short:'苏黎世大教堂', label:'Grossmunster Zurich', purpose:'从湖边回到老城核心区，打卡苏黎世最有辨识度的双塔教堂。', shoot:'拍双塔教堂外观、桥上回望老城、利马特河两岸、教堂与河道同框。', lat:47.37005, lng:8.54408},
  {no:5,time:'15:55–16:25', title:'圣母大教堂', short:'圣母大教堂', label:'Fraumunster Zurich', purpose:'从苏黎世大教堂过桥到圣母大教堂，完成老城两座核心教堂的对照打卡。', shoot:'拍圣母大教堂尖顶、桥面视角、河岸建筑、教堂与蓝绿色尖顶的竖构图。', lat:47.36972, lng:8.54108},
  {no:4,time:'16:25–16:50', title:'班霍夫大街', short:'班霍夫大街', label:'Bahnhofstrasse Zurich', purpose:'从教堂区切换到商业街区，快速感受苏黎世主街氛围。', shoot:'拍街道纵深、橱窗、瑞士城市电车、路牌和整齐的商业街画面。', lat:47.37165, lng:8.53856},
  {no:3,time:'16:50–17:20', title:'奥古斯丁巷', short:'奥古斯丁巷', label:'Augustinergasse Zurich', purpose:'专门来拍苏黎世老城最经典的彩色窗户和窄巷氛围。', shoot:'拍彩色凸窗、老城石板路、窄巷纵深、街角招牌和人物走在巷子里的画面。', lat:47.37137, lng:8.54010},
  {no:2,time:'17:20–18:00', title:'林登霍夫山丘', short:'林登霍夫山丘', label:'Lindenhof Zurich', purpose:'最后一个老城高点，适合在离开前俯拍苏黎世经典视角。', shoot:'拍利马特河俯瞰、老城屋顶、苏黎世大教堂双塔、河对岸建筑和城市全景。', lat:47.37310, lng:8.54055},
  {no:1,time:'18:00–18:35', title:'苏黎世火车站', short:'苏黎世火车站', label:'Zurich HB', purpose:'回到苏黎世主站，预留买水、上厕所、找站台和处理行李的时间。', shoot:'拍火车站外观、站内大钟、站台信息屏；随后坐车去苏黎世机场。', lat:47.37818, lng:8.54019}
];
function enc(x){return encodeURIComponent(x)}
function googleApp(p){return `comgooglemaps://?q=${p.lat},${p.lng}&center=${p.lat},${p.lng}&zoom=16`}
function appleApp(p){return `maps://?q=${enc(p.title)}&ll=${p.lat},${p.lng}`}
function copyText(text){try{navigator.clipboard.writeText(text)}catch(e){}}

const nav=document.getElementById('orderNav');
points.forEach(p=>{
  const a=document.createElement('a');
  a.className='order-link';
  a.href=`#stop-${p.no}`;
  a.innerHTML=`<span class="badge">${p.no}</span><div><b>${p.short}</b><span>${p.time}</span></div>`;
  a.addEventListener('click',()=>{setTimeout(()=>focusPoint(p.no),120)});
  nav.appendChild(a);
});

const map = L.map('map',{scrollWheelZoom:true}).setView([47.3719,8.5438],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'&copy; OpenStreetMap contributors'}).addTo(map);
const latlngs = points.map(p => [p.lat,p.lng]);
L.polyline(latlngs,{weight:5,opacity:.78,color:'#b35a16'}).addTo(map);
map.fitBounds(L.latLngBounds(latlngs),{padding:[32,32]});
let markers = {};
points.forEach(p=>{
  const icon = L.divIcon({className:'', html:`<div class="marker-label">${p.no}</div>`, iconSize:[30,30], iconAnchor:[15,15]});
  const html = `<div><div class="popup-title">${p.no}. ${p.title}</div><div class="popup-meta"><b>${p.time}</b><br><b>去干嘛：</b>${p.purpose}<br><b>拍什么：</b>${p.shoot}</div><div class="btnrow"><a class="btn small google" href="${googleApp(p)}">Google 地图</a><a class="btn small apple" href="${appleApp(p)}">Apple 地图</a></div></div>`;
  markers[p.no] = L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup(html);
});

const modules=document.getElementById('modules');
points.forEach(p=>{
  const div=document.createElement('section');
  div.className='stop';
  div.id=`stop-${p.no}`;
  div.innerHTML=`<div class="stophead"><span class="badge">${p.no}</span><div><h2>${p.title}</h2><div class="time">${p.time}</div></div></div><p class="txt"><span class="tag">去干嘛</span>${p.purpose}</p><p class="txt muted"><span class="tag">拍什么</span>${p.shoot}</p><div class="btnrow" style="margin-top:10px"><a class="btn google" href="${googleApp(p)}">Google 地图</a><a class="btn apple" href="${appleApp(p)}">Apple 地图</a><a class="btn dark" href="#map" onclick="focusPoint(${p.no})">地图定位</a></div>`;
  modules.appendChild(div);
});
function focusPoint(no){const p=points.find(x=>x.no===no); if(!p)return; map.setView([p.lat,p.lng],17); markers[no].openPopup();}
</script>
</body>
</html>
